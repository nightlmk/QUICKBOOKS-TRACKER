name: Check QB Versions

on:
  schedule:
    - cron: '0 0,12 * * *'  # Twice daily: midnight and noon UTC
  workflow_dispatch:       # Allow manual trigger

jobs:
  check-versions:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install required tools
        run: |
          sudo apt-get update -q
          sudo apt-get install -y p7zip-full msitools

      - name: Check QB versions
        run: |
          python3 check_versions.py

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add versions.json
          git diff --staged --quiet || git commit -m "Update QB versions $(date -u +%Y-%m-%d)"
          git push
